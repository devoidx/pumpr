services:
  db:
    image: postgres:16
    container_name: pumpr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pumpr}
      POSTGRES_USER: ${POSTGRES_USER:-pumpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pumpr_db_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pumpr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pumpr_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pumpr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pumpr}
      FUEL_FINDER_CLIENT_ID: ${FUEL_FINDER_CLIENT_ID}
      FUEL_FINDER_CLIENT_SECRET: ${FUEL_FINDER_CLIENT_SECRET}
      FUEL_FINDER_TOKEN_URL: ${FUEL_FINDER_TOKEN_URL}
      FUEL_FINDER_API_URL: ${FUEL_FINDER_API_URL}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-30}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_ANNUAL: ${STRIPE_PRICE_ANNUAL:-}
      MASTODON_INSTANCE: ${MASTODON_INSTANCE:-https://mastodon.social}
      MASTODON_ACCESS_TOKEN: ${MASTODON_ACCESS_TOKEN:-}
      DVLA_API_KEY: ${DVLA_API_KEY:-}
      ENABLE_SOCIAL_POSTS: ${ENABLE_SOCIAL_POSTS:-true}
      ENABLE_PRICE_POLLING: ${ENABLE_PRICE_POLLING:-true}
      OCM_API_KEY: ${OCM_API_KEY}
      BSKY_HANDLE: ${BSKY_HANDLE}
      BSKY_APP_PASSWORD: ${BSKY_APP_PASSWORD}
      THREADS_ACCESS_TOKEN: ${THREADS_ACCESS_TOKEN:-}
      THREADS_USER_ID: ${THREADS_USER_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      THREADS_TOKEN_FILE: /app/data/threads_token.txt
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_HASH: ${BUILD_HASH:-dev}
        VITE_SHOW_AUTH: ${VITE_SHOW_AUTH:-false}
    container_name: pumpr_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3003:80"

volumes:
  pumpr_db_data:

networks:
  default:
    name: pumpr_network
