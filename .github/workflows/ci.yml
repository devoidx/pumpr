name: CI

on:
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: cd backend && ruff check app/

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock fastapi sqlalchemy pydantic pydantic-settings slowapi apscheduler asyncpg atproto

      - name: Run tests
        run: cd backend && python3 -m pytest tests/ -q
        env:
          DATABASE_URL: postgresql+asyncpg://pumpr:pumpr@localhost:5432/pumpr
          FUEL_FINDER_CLIENT_ID: test
          FUEL_FINDER_CLIENT_SECRET: test
          FUEL_FINDER_TOKEN_URL: http://localhost
          FUEL_FINDER_API_URL: http://localhost
          OCM_API_KEY: test
          BSKY_HANDLE: test
          BSKY_APP_PASSWORD: test
          SECRET_KEY: testsecretkey
