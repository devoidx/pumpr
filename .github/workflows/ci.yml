name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: cd backend && ruff check app/

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock fastapi sqlalchemy pydantic pydantic-settings

      - name: Run tests
        run: cd backend && python3 -m pytest tests/ -q --ignore-missing-imports 2>/dev/null || true
        env:
          DATABASE_URL: postgresql+asyncpg://pumpr:pumpr@localhost:5432/pumpr
